name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build-whisper:
    name: Build whisper-server
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            target: linux-x64
            architecture: x86_64
          - runner: macos-14
            target: macos-arm64
            architecture: arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Verify managed runtime architecture
        run: |
          test "$(uname -m)" = "${{ matrix.architecture }}"

      - name: Import Apple Certificate
        if: matrix.target == 'macos-arm64'
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE }}
          P12_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASS }}
          KEYCHAIN_PASSWORD: "temporary-keychain-pass"
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -A
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH

      - name: Build macOS standalone binaries
        if: matrix.target == 'macos-arm64'
        run: |
          mkdir -p build-cli
          bun build src/cli.ts --compile --target=bun-darwin-arm64 --asset-naming='[dir]/[name].[ext]' --outfile build-cli/local-base-macos-arm64
          bun build src/cli.ts --compile --target=bun-darwin-x64 --asset-naming='[dir]/[name].[ext]' --outfile build-cli/local-base-macos-x64

      - name: Build verified whisper-server
        run: bun run scripts/build-whisper.ts

      - name: Sign macOS binaries
        if: matrix.target == 'macos-arm64'
        run: |
          codesign --force --options runtime --sign "Developer ID Application:" build-cli/local-base-macos-arm64
          codesign --force --options runtime --sign "Developer ID Application:" build-cli/local-base-macos-x64
          codesign --force --options runtime --sign "Developer ID Application:" build-whisper/whisper-server

      - name: Notarize macOS binaries
        if: matrix.target == 'macos-arm64'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          zip -j local-base-macos-arm64.zip build-cli/local-base-macos-arm64
          zip -j local-base-macos-x64.zip build-cli/local-base-macos-x64
          zip -j whisper-server-macos-arm64.zip build-whisper/whisper-server

          # Submit to Apple Notarization Service and wait for results
          xcrun notarytool submit local-base-macos-arm64.zip --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$TEAM_ID" --wait
          xcrun notarytool submit local-base-macos-x64.zip --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$TEAM_ID" --wait
          xcrun notarytool submit whisper-server-macos-arm64.zip --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$TEAM_ID" --wait

      - name: Clean up temporary keychain
        if: always() && matrix.target == 'macos-arm64'
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true

      - name: Upload macOS ARM64 CLI binary
        if: matrix.target == 'macos-arm64'
        uses: actions/upload-artifact@v4
        with:
          name: macos-cli-arm64
          path: build-cli/local-base-macos-arm64

      - name: Upload macOS x64 CLI binary
        if: matrix.target == 'macos-arm64'
        uses: actions/upload-artifact@v4
        with:
          name: macos-cli-x64
          path: build-cli/local-base-macos-x64

      - name: Upload whisper-server artifact
        uses: actions/upload-artifact@v4
        with:
          name: whisper-runtime-${{ matrix.target }}
          path: build-whisper/whisper-server

  release:
    name: Package and Release
    needs: build-whisper
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run validation checks
        run: |
          bun run typecheck
          bun run check

      - name: Build Linux CLI binaries
        run: |
          mkdir -p release

          # Linux AMD64 (x64)
          bun build src/cli.ts --compile --target=bun-linux-x64 --asset-naming='[dir]/[name].[ext]' --outfile release/local-base-linux-x64

          # Linux ARM64
          bun build src/cli.ts --compile --target=bun-linux-arm64 --asset-naming='[dir]/[name].[ext]' --outfile release/local-base-linux-arm64

      - name: Download macOS ARM64 CLI binary
        uses: actions/download-artifact@v4
        with:
          name: macos-cli-arm64
          path: release-macos-cli

      - name: Download macOS x64 CLI binary
        uses: actions/download-artifact@v4
        with:
          name: macos-cli-x64
          path: release-macos-cli

      - name: Download whisper-server (Linux x64)
        uses: actions/download-artifact@v4
        with:
          name: whisper-runtime-linux-x64
          path: release-linux-x64

      - name: Download whisper-server (macOS ARM64)
        uses: actions/download-artifact@v4
        with:
          name: whisper-runtime-macos-arm64
          path: release-macos-arm64

      - name: Copy binaries
        run: |
          cp release-linux-x64/whisper-server release/whisper-server-linux-x64
          cp release-macos-arm64/whisper-server release/whisper-server-macos-arm64
          cp release-macos-cli/local-base-macos-arm64 release/local-base-macos-arm64
          cp release-macos-cli/local-base-macos-x64 release/local-base-macos-x64

      - name: Generate SHA-256 Checksums
        run: |
          cd release
          sha256sum local-base-* whisper-server-* > checksums.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/local-base-macos-arm64
            release/local-base-macos-x64
            release/local-base-linux-x64
            release/local-base-linux-arm64
            release/whisper-server-macos-arm64
            release/whisper-server-linux-x64
            release/checksums.txt
          generate_release_notes: true
