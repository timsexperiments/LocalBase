name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run validation checks
        run: |
          bun run typecheck
          bun run check

      - name: Build cross-compiled native binaries
        run: |
          mkdir -p release
          
          # macOS Apple Silicon (ARM64)
          bun build src/cli.ts --compile --target=bun-darwin-arm64 --outfile release/local-base-macos-arm64
          
          # macOS Intel (x64)
          bun build src/cli.ts --compile --target=bun-darwin-x64 --outfile release/local-base-macos-x64
          
          # Linux AMD64 (x64)
          bun build src/cli.ts --compile --target=bun-linux-x64 --outfile release/local-base-linux-x64
          
          # Linux ARM64
          bun build src/cli.ts --compile --target=bun-linux-arm64 --outfile release/local-base-linux-arm64
          
          # Windows x64
          bun build src/cli.ts --compile --target=bun-windows-x64 --outfile release/local-base-windows-x64.exe

      - name: Generate SHA-256 Checksums
        run: |
          cd release
          sha256sum local-base-* > checksums.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/local-base-macos-arm64
            release/local-base-macos-x64
            release/local-base-linux-x64
            release/local-base-linux-arm64
            release/local-base-windows-x64.exe
            release/checksums.txt
          generate_release_notes: true

      - name: Publish to NPM
        run: |
          bun run build:js
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
