name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  build-whisper:
    name: Build whisper-server
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone whisper.cpp
        run: git clone --depth 1 https://github.com/ggml-org/whisper.cpp.git

      - name: Setup Bun
        if: matrix.os == 'macos-latest'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        if: matrix.os == 'macos-latest'
        run: bun install --frozen-lockfile

      - name: Import Apple Certificate
        if: matrix.os == 'macos-latest'
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE }}
          P12_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASS }}
          KEYCHAIN_PASSWORD: "temporary-keychain-pass"
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -A
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH

      - name: Build macOS standalone binaries
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p build-cli
          bun build src/cli.ts --compile --target=bun-darwin-arm64 --outfile build-cli/local-base-macos-arm64
          bun build src/cli.ts --compile --target=bun-darwin-x64 --outfile build-cli/local-base-macos-x64

      - name: Build whisper-server
        run: |
          cd whisper.cpp
          cmake -B build -DWHISPER_BUILD_TESTS=OFF -DWHISPER_BUILD_EXAMPLES=ON -DBUILD_SHARED_LIBS=OFF
          cmake --build build --config Release -j

      - name: Build whisper-server (macOS Intel cross-compile)
        if: matrix.os == 'macos-latest'
        run: |
          cd whisper.cpp
          cmake -B build-intel -DCMAKE_OSX_ARCHITECTURES=x86_64 -DWHISPER_BUILD_TESTS=OFF -DWHISPER_BUILD_EXAMPLES=ON -DBUILD_SHARED_LIBS=OFF
          cmake --build build-intel --config Release -j

      - name: Sign macOS binaries
        if: matrix.os == 'macos-latest'
        run: |
          codesign --force --options runtime --sign "Developer ID Application:" build-cli/local-base-macos-arm64
          codesign --force --options runtime --sign "Developer ID Application:" build-cli/local-base-macos-x64
          codesign --force --options runtime --sign "Developer ID Application:" whisper.cpp/build/bin/whisper-server
          codesign --force --options runtime --sign "Developer ID Application:" whisper.cpp/build-intel/bin/whisper-server

      - name: Notarize macOS binaries
        if: matrix.os == 'macos-latest'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          zip -j local-base-macos-arm64.zip build-cli/local-base-macos-arm64
          zip -j local-base-macos-x64.zip build-cli/local-base-macos-x64
          zip -j whisper-server-macos-arm64.zip whisper.cpp/build/bin/whisper-server
          zip -j whisper-server-macos-x64.zip whisper.cpp/build-intel/bin/whisper-server
          
          # Submit to Apple Notarization Service and wait for results
          xcrun notarytool submit local-base-macos-arm64.zip --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$TEAM_ID" --wait
          xcrun notarytool submit local-base-macos-x64.zip --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$TEAM_ID" --wait
          xcrun notarytool submit whisper-server-macos-arm64.zip --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$TEAM_ID" --wait
          xcrun notarytool submit whisper-server-macos-x64.zip --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$TEAM_ID" --wait

      - name: Clean up temporary keychain
        if: always() && matrix.os == 'macos-latest'
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true

      - name: Upload macOS CLI binaries
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-cli-binaries
          path: build-cli/

      - name: Upload whisper-server artifact (ARM64 / Linux)
        uses: actions/upload-artifact@v4
        with:
          name: whisper-binary-${{ matrix.os }}
          path: whisper.cpp/build/bin/whisper-server

      - name: Upload whisper-server artifact (macOS Intel)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: whisper-binary-macos-intel
          path: whisper.cpp/build-intel/bin/whisper-server


  release:
    name: Package and Release
    needs: build-whisper
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run validation checks
        run: |
          bun run typecheck
          bun run check

      - name: Build cross-compiled native binaries
        run: |
          mkdir -p release
          
          # Linux AMD64 (x64)
          bun build src/cli.ts --compile --target=bun-linux-x64 --outfile release/local-base-linux-x64
          
          # Linux ARM64
          bun build src/cli.ts --compile --target=bun-linux-arm64 --outfile release/local-base-linux-arm64
          
          # Windows x64
          bun build src/cli.ts --compile --target=bun-windows-x64 --outfile release/local-base-windows-x64.exe

      - name: Download macOS CLI binaries
        uses: actions/download-artifact@v4
        with:
          name: macos-cli-binaries
          path: release-macos-cli

      - name: Download whisper-server (Linux x64)
        uses: actions/download-artifact@v4
        with:
          name: whisper-binary-ubuntu-latest
          path: release-linux-x64

      - name: Download whisper-server (macOS ARM64)
        uses: actions/download-artifact@v4
        with:
          name: whisper-binary-macos-latest
          path: release-macos-arm64

      - name: Download whisper-server (macOS x64)
        uses: actions/download-artifact@v4
        with:
          name: whisper-binary-macos-intel
          path: release-macos-x64


      - name: Copy binaries
        run: |
          cp release-linux-x64/whisper-server release/whisper-server-linux-x64
          cp release-macos-arm64/whisper-server release/whisper-server-macos-arm64
          cp release-macos-x64/whisper-server release/whisper-server-macos-x64
          cp release-macos-cli/local-base-macos-arm64 release/local-base-macos-arm64
          cp release-macos-cli/local-base-macos-x64 release/local-base-macos-x64

      - name: Generate SHA-256 Checksums
        run: |
          cd release
          sha256sum local-base-* whisper-server-* > checksums.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/local-base-macos-arm64
            release/local-base-macos-x64
            release/local-base-linux-x64
            release/local-base-linux-arm64
            release/local-base-windows-x64.exe
            release/whisper-server-macos-arm64
            release/whisper-server-macos-x64
            release/whisper-server-linux-x64
            release/checksums.txt
          generate_release_notes: true

